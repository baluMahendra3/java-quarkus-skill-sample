quarkus.http.port=8080
quarkus.banner.enabled=false

# ─── In-Memory H2 DataSource ──────────────────────────────────────────────────
quarkus.datasource.db-kind=h2
quarkus.datasource.username=sa
quarkus.datasource.password=
quarkus.datasource.jdbc.url=jdbc:h2:mem:travel_db;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE

# ─── Hibernate ORM ────────────────────────────────────────────────────────────
quarkus.hibernate-orm.database.generation=update
quarkus.hibernate-orm.log.sql=false
%dev.quarkus.hibernate-orm.database.generation=drop-and-create

# ─── JWT ──────────────────────────────────────────────────────────────────────
mp.jwt.verify.issuer=travel-app
mp.jwt.verify.publickey.location=META-INF/resources/publicKey.pem
smallrye.jwt.sign.key.location=META-INF/resources/privateKey.pem
smallrye.jwt.new-token.issuer=travel-app
smallrye.jwt.new-token.lifespan=86400

# ─── Swagger UI ───────────────────────────────────────────────────────────────
quarkus.swagger-ui.always-include=false
%dev.quarkus.swagger-ui.always-include=true
%test.quarkus.swagger-ui.always-include=true
quarkus.swagger-ui.path=/swagger-ui
quarkus.smallrye-openapi.info-title=Travel Business Management API
quarkus.smallrye-openapi.info-version=1.0.0
quarkus.smallrye-openapi.info-description=API for managing trips, drivers, financials and dashboard

# ─── CORS ─────────────────────────────────────────────────────────────────────
quarkus.http.cors=true
quarkus.http.cors.origins=${TRAVEL_CORS_ORIGINS}
%dev.quarkus.http.cors.origins=http://localhost:3000,http://127.0.0.1:3000
quarkus.http.cors.methods=GET,POST,PUT,DELETE,OPTIONS
quarkus.http.cors.headers=accept,authorization,content-type
